name: Supabase Keep Alive
on:
  schedule:
    # Runs at midnight every Sunday and Thursday
    - cron: '0 0 * * 0,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        run: |
          curl -X GET "https://cqumntwoephyeutyckjh.supabase.co/rest/v1/campaigns?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON }}"
