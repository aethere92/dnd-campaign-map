name: Supabase Keep Alive

on:
  schedule:
    # Every 5 days to stay well within the 7-day window
    - cron: '0 0 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent pausing
        run: |
          # Do a write + read to make it a real DB interaction
          # Insert a keepalive row (upsert so it doesn't pile up)
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://cqumntwoephyeutyckjh.supabase.co/rest/v1/keepalive" \
            -H "apikey: ${{ secrets.SUPABASE_ANON }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d '{"id": 1, "pinged_at": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}'

          # Also do a read to be safe
          curl -s -o /dev/null -w "%{http_code}" \
            -X GET "https://cqumntwoephyeutyckjh.supabase.co/rest/v1/campaigns?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON }}"
